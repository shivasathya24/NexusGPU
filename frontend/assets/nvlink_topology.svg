<svg width="460" height="200" viewBox="0 0 460 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- PCIe Switch representation -->
    <rect x="190" y="80" width="80" height="40" rx="6" fill="#1E293B" stroke="#00D2FF" stroke-width="1"/>
    <text x="230" y="104" fill="#00D2FF" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">PCIe Gen5</text>
    
    <!-- NVLink paths (mesh ring lines) -->
    <path d="M40 50 L140 50 M140 50 L240 50 M240 50 L340 50 M340 50 L420 50" stroke="#76B900" stroke-width="2" stroke-dasharray="6 3"/>
    <path d="M40 150 L140 150 M140 150 L240 150 M240 150 L340 150 M340 150 L420 150" stroke="#76B900" stroke-width="2" stroke-dasharray="6 3"/>
    
    <!-- Connections to switch -->
    <path d="M40 50 L230 80 M140 50 L230 80 M240 50 L230 80 M340 50 L230 80 M420 50 L230 80" stroke="rgba(0,210,255,0.15)" stroke-width="1"/>
    <path d="M40 150 L230 120 M140 150 L230 120 M240 150 L230 120 M340 150 L230 120 M420 150 L230 120" stroke="rgba(0,210,255,0.15)" stroke-width="1"/>
    
    <!-- Nodes (G0-G7) -->
    <!-- Top Nodes -->
    <circle cx="40" cy="50" r="16" fill="#0F172A" stroke="#76B900" stroke-width="1.5"/>
    <text x="40" y="54" fill="#FFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">G0</text>
    
    <circle cx="140" cy="50" r="16" fill="#0F172A" stroke="#76B900" stroke-width="1.5"/>
    <text x="140" y="54" fill="#FFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">G1</text>
    
    <circle cx="240" cy="50" r="16" fill="#0F172A" stroke="#76B900" stroke-width="1.5"/>
    <text x="240" y="54" fill="#FFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">G2</text>
    
    <circle cx="340" cy="50" r="16" fill="#0F172A" stroke="#76B900" stroke-width="1.5"/>
    <text x="340" y="54" fill="#FFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">G3</text>
    
    <!-- Bottom Nodes -->
    <circle cx="40" cy="150" r="16" fill="#0F172A" stroke="#76B900" stroke-width="1.5"/>
    <text x="40" y="154" fill="#FFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">G7</text>
    
    <circle cx="140" cy="150" r="16" fill="#0F172A" stroke="#76B900" stroke-width="1.5"/>
    <text x="140" y="154" fill="#FFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">G6</text>
    
    <circle cx="240" cy="150" r="16" fill="#0F172A" stroke="#EF4444" stroke-width="1.5"/>
    <text x="240" y="154" fill="#FFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">G5</text>
    
    <circle cx="340" cy="150" r="16" fill="#0F172A" stroke="#76B900" stroke-width="1.5"/>
    <text x="340" y="154" fill="#FFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">G4</text>
    
    <!-- Side Ring Links -->
    <path d="M40 66 L40 134 M340 66 L340 134" stroke="#76B900" stroke-width="1.5"/>
</svg>
